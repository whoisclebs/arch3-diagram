name: Publish packages to GitHub Packages

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@whoisclebs'

      - name: Install dependencies
        run: npm ci

      - name: Validate repository
        run: npm run typecheck && npm run test

      - name: Publish @whoisclebs/arch3-model
        run: npm publish -w @whoisclebs/arch3-model
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @whoisclebs/arch3-dsl
        run: npm publish -w @whoisclebs/arch3-dsl
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @whoisclebs/arch3-plantuml
        run: npm publish -w @whoisclebs/arch3-plantuml
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @whoisclebs/arch3-cli
        run: npm publish -w @whoisclebs/arch3-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
